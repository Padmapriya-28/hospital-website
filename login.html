<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login - RIYA MEDICARE Hospital">
    <title>Login - RIYA MEDICARE Hospital</title>
    <link rel="stylesheet" href="./css/style.css">
    <style>
        /* Login Page Specific Styles */
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0a0a0a 0%, #2d1b4a 50%, #0a0a0a 100%);
            padding: var(--spacing-lg);
            overflow: hidden;
        }

        .login-container::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(181, 55, 242, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(60px);
            animation: float 15s ease-in-out infinite;
        }

        .login-container::after {
            content: '';
            position: absolute;
            bottom: -30%;
            left: -30%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(0, 240, 255, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(60px);
            animation: float 20s ease-in-out infinite reverse;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(30px, -30px); }
        }

        .login-box {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 450px;
            background: rgba(26, 26, 46, 0.95);
            border: 2px solid var(--primary-color);
            border-radius: var(--radius-xl);
            padding: var(--spacing-2xl);
            box-shadow: 0 0 50px rgba(181, 55, 242, 0.4), 0 0 100px rgba(181, 55, 242, 0.2);
            backdrop-filter: blur(10px);
        }

        .login-header {
            text-align: center;
            margin-bottom: var(--spacing-2xl);
            animation: slideDown 0.6s ease-out;
        }

        .login-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--spacing-sm);
            margin-bottom: var(--spacing-md);
        }

        .login-logo .icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--primary-color), var(--neon-pink));
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            box-shadow: 0 0 30px rgba(181, 55, 242, 0.6);
        }

        .login-header h1 {
            font-size: var(--font-size-2xl);
            color: var(--text-primary);
            margin: var(--spacing-md) 0 0 0;
            text-shadow: 0 0 20px rgba(181, 55, 242, 0.3);
        }

        .login-header p {
            color: var(--text-secondary);
            margin: var(--spacing-sm) 0 0 0;
            font-size: var(--font-size-sm);
        }

        .login-tabs {
            display: flex;
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-2xl);
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: var(--spacing-md);
        }

        .login-tab {
            flex: 1;
            padding: var(--spacing-md);
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: var(--font-size-base);
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-short);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            position: relative;
        }

        .login-tab:hover {
            color: var(--primary-color);
            text-shadow: 0 0 10px rgba(181, 55, 242, 0.3);
        }

        .login-tab.active {
            color: var(--primary-color);
            text-shadow: 0 0 15px rgba(181, 55, 242, 0.5);
        }

        .login-tab.active::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--primary-color), var(--neon-cyan));
            border-radius: 2px;
            box-shadow: 0 0 15px rgba(181, 55, 242, 0.5);
        }

        .login-form {
            display: none;
            animation: fadeIn 0.4s ease-out;
        }

        .login-form.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-group {
            margin-bottom: var(--spacing-lg);
        }

        label {
            display: block;
            margin-bottom: var(--spacing-sm);
            font-weight: 600;
            color: var(--text-primary);
            text-transform: uppercase;
            font-size: var(--font-size-sm);
            letter-spacing: 0.5px;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"],
        input[type="tel"] {
            width: 100%;
            padding: var(--spacing-md);
            background-color: rgba(45, 27, 74, 0.5);
            color: var(--text-primary);
            border: 1px solid var(--primary-color);
            border-radius: var(--radius-md);
            font-family: var(--font-primary);
            font-size: var(--font-size-base);
            transition: all var(--transition-short);
            box-shadow: inset 0 0 5px rgba(181, 55, 242, 0.1);
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="password"]:focus,
        input[type="tel"]:focus {
            outline: none;
            border-color: var(--neon-cyan);
            box-shadow: 0 0 0 3px rgba(181, 55, 242, 0.2), inset 0 0 10px rgba(181, 55, 242, 0.1), 0 0 20px rgba(0, 240, 255, 0.3);
        }

        input::placeholder {
            color: rgba(224, 170, 255, 0.5);
        }

        .remember-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--spacing-lg);
            font-size: var(--font-size-sm);
        }

        .remember-row label {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            margin: 0;
            text-transform: none;
            letter-spacing: normal;
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--primary-color);
        }

        .forgot-password {
            color: var(--primary-light);
            text-decoration: none;
            transition: all var(--transition-short);
        }

        .forgot-password:hover {
            color: var(--neon-cyan);
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
        }

        .login-btn {
            width: 100%;
            padding: var(--spacing-md);
            background: linear-gradient(135deg, var(--primary-color), #8b3fc9);
            color: #000000;
            border: none;
            border-radius: var(--radius-md);
            font-size: var(--font-size-base);
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all var(--transition-medium);
            box-shadow: 0 0 20px rgba(181, 55, 242, 0.4);
            position: relative;
            overflow: hidden;
        }

        .login-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.6s ease;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 40px rgba(181, 55, 242, 0.7), 0 0 80px rgba(181, 55, 242, 0.3);
        }

        .login-btn:hover::before {
            left: 100%;
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .form-error {
            color: var(--neon-pink);
            font-size: var(--font-size-sm);
            margin-top: var(--spacing-xs);
            text-shadow: 0 0 5px rgba(255, 0, 110, 0.3);
            display: none;
        }

        .form-error.show {
            display: block;
        }

        .signup-link {
            text-align: center;
            margin-top: var(--spacing-lg);
            color: var(--text-secondary);
            font-size: var(--font-size-sm);
        }

        .signup-link a {
            color: var(--primary-light);
            text-decoration: none;
            font-weight: 600;
            transition: all var(--transition-short);
        }

        .signup-link a:hover {
            color: var(--neon-cyan);
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
        }

        .alert {
            padding: var(--spacing-md);
            border-radius: var(--radius-md);
            margin-bottom: var(--spacing-lg);
            animation: slideDown 0.3s ease-out;
            display: none;
        }

        .alert.show {
            display: block;
        }

        .alert-success {
            background-color: rgba(0, 240, 255, 0.1);
            color: var(--neon-cyan);
            border: 1px solid var(--neon-cyan);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
        }

        .alert-error {
            background-color: rgba(255, 0, 110, 0.1);
            color: var(--neon-pink);
            border: 1px solid var(--neon-pink);
            box-shadow: 0 0 15px rgba(255, 0, 110, 0.3);
        }

        .back-link {
            text-align: center;
            margin-top: var(--spacing-lg);
        }

        .back-link a {
            color: var(--primary-light);
            text-decoration: none;
            font-size: var(--font-size-sm);
            transition: all var(--transition-short);
            display: inline-flex;
            align-items: center;
            gap: var(--spacing-sm);
        }

        .back-link a:hover {
            color: var(--neon-cyan);
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
        }

        @media (max-width: 768px) {
            .login-box {
                max-width: 100%;
                padding: var(--spacing-xl);
            }

            .login-header h1 {
                font-size: var(--font-size-xl);
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <!-- Login Header -->
            <div class="login-header">
                <div class="login-logo">
                    <div class="icon">⚕️</div>
                </div>
                <h1>RIYA MEDICARE</h1>
                <p>Secure Healthcare Portal</p>
            </div>

            <!-- Alert Messages -->
            <div id="alert" class="alert"></div>

            <!-- Login Tabs -->
            <div class="login-tabs">
                <button class="login-tab active" onclick="switchTab('patient')">Patient Login</button>
                <button class="login-tab" onclick="switchTab('admin')">Hospital Admin</button>
            </div>

            <!-- Patient Login Form -->
            <form id="patientForm" class="login-form active" onsubmit="loginPatient(event)">
                <div class="form-group">
                    <label for="patient-email">Email Address</label>
                    <input 
                        type="email" 
                        id="patient-email" 
                        placeholder="Enter your email"
                        required
                    >
                    <div class="form-error" id="patient-email-error"></div>
                </div>

                <div class="form-group">
                    <label for="patient-password">Password</label>
                    <input 
                        type="password" 
                        id="patient-password" 
                        placeholder="Enter your password"
                        required
                    >
                    <div class="form-error" id="patient-password-error"></div>
                </div>

                <div class="remember-row">
                    <label>
                        <input type="checkbox" id="patient-remember">
                        Remember me
                    </label>
                    <a href="#" class="forgot-password">Forgot Password?</a>
                </div>

                <button type="submit" class="login-btn">Login as Patient</button>

                <div class="signup-link">
                    Don't have an account? <a href="#" onclick="alert('Patient registration coming soon!')">Sign up here</a>
                </div>
            </form>

            <!-- Hospital Admin Login Form -->
            <form id="adminForm" class="login-form" onsubmit="loginAdmin(event)">
                <div class="form-group">
                    <label for="admin-id">Admin ID</label>
                    <input 
                        type="text" 
                        id="admin-id" 
                        placeholder="Enter your admin ID"
                        required
                    >
                    <div class="form-error" id="admin-id-error"></div>
                </div>

                <div class="form-group">
                    <label for="admin-email">Email Address</label>
                    <input 
                        type="email" 
                        id="admin-email" 
                        placeholder="Enter your hospital email"
                        required
                    >
                    <div class="form-error" id="admin-email-error"></div>
                </div>

                <div class="form-group">
                    <label for="admin-password">Password</label>
                    <input 
                        type="password" 
                        id="admin-password" 
                        placeholder="Enter your password"
                        required
                    >
                    <div class="form-error" id="admin-password-error"></div>
                </div>

                <div class="remember-row">
                    <label>
                        <input type="checkbox" id="admin-remember">
                        Remember me
                    </label>
                    <a href="#" class="forgot-password">Forgot Password?</a>
                </div>

                <button type="submit" class="login-btn">Login as Admin</button>

                <div class="signup-link">
                    Contact IT support for account issues
                </div>
            </form>
        </div>
    </div>

    <script>
        // Switch between login tabs
        function switchTab(tab) {
            // Update tab buttons
            const tabs = document.querySelectorAll('.login-tab');
            tabs.forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');

            // Update forms
            const forms = document.querySelectorAll('.login-form');
            forms.forEach(f => f.classList.remove('active'));
            
            if (tab === 'patient') {
                document.getElementById('patientForm').classList.add('active');
            } else {
                document.getElementById('adminForm').classList.add('active');
            }

            // Clear alerts
            clearAlert();
        }

        // Patient Login Handler
        function loginPatient(event) {
            event.preventDefault();
            
            const email = document.getElementById('patient-email').value;
            const password = document.getElementById('patient-password').value;
            const remember = document.getElementById('patient-remember').checked;

            // Basic validation
            if (!email || !password) {
                showAlert('Please fill in all fields', 'error');
                return;
            }

            if (!validateEmail(email)) {
                showAlert('Please enter a valid email address', 'error');
                return;
            }

            if (password.length < 6) {
                showAlert('Password must be at least 6 characters', 'error');
                return;
            }

            // Simulate login (in real app, this would be an API call)
            const patientData = {
                email: email,
                loginTime: new Date().toISOString(),
                remember: remember
            };

            localStorage.setItem('patientLogin', JSON.stringify(patientData));
            showAlert('Patient login successful! Redirecting...', 'success');
            
            setTimeout(() => {
                window.location.href = './my-appointments.html';
            }, 1500);
        }

        // Admin Login Handler
        function loginAdmin(event) {
            event.preventDefault();
            
            const adminId = document.getElementById('admin-id').value;
            const email = document.getElementById('admin-email').value;
            const password = document.getElementById('admin-password').value;
            const remember = document.getElementById('admin-remember').checked;

            // Basic validation
            if (!adminId || !email || !password) {
                showAlert('Please fill in all fields', 'error');
                return;
            }

            if (!validateEmail(email)) {
                showAlert('Please enter a valid hospital email', 'error');
                return;
            }

            if (!email.includes('@riyamedicare.com')) {
                showAlert('Please use your hospital email (admin@riyamedicare.com)', 'error');
                return;
            }

            if (password.length < 8) {
                showAlert('Hospital admin passwords must be at least 8 characters', 'error');
                return;
            }

            // Simulate admin login
            const adminData = {
                adminId: adminId,
                email: email,
                loginTime: new Date().toISOString(),
                remember: remember
            };

            localStorage.setItem('adminLogin', JSON.stringify(adminData));
            showAlert('Admin login successful! Redirecting to dashboard...', 'success');
            
            setTimeout(() => {
                window.location.href = './admin-dashboard.html';
            }, 1500);
        }

        // Email validation
        function validateEmail(email) {
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return emailRegex.test(email);
        }

        // Show alert message
        function showAlert(message, type) {
            const alertBox = document.getElementById('alert');
            alertBox.textContent = message;
            alertBox.className = `alert show alert-${type}`;
            
            // Auto-hide after 5 seconds
            setTimeout(() => {
                alertBox.classList.remove('show');
            }, 5000);
        }

        // Clear alert
        function clearAlert() {
            const alertBox = document.getElementById('alert');
            alertBox.classList.remove('show');
        }

        // Check for remembered login
        window.addEventListener('load', () => {
            // Check if already logged in - redirect to appropriate dashboard
            const patientLogin = localStorage.getItem('patientLogin');
            const adminLogin = localStorage.getItem('adminLogin');
            
            if (patientLogin) {
                console.log('Patient already logged in, redirecting to my appointments');
                window.location.href = './my-appointments.html';
                return;
            }
            
            if (adminLogin) {
                console.log('Admin already logged in, redirecting to dashboard');
                window.location.href = './admin-dashboard.html';
                return;
            }
            
            // Auto-fill remembered email
            const patientRemember = document.getElementById('patient-remember').checked;
            if (patientLogin && patientRemember) {
                const data = JSON.parse(patientLogin);
                document.getElementById('patient-email').value = data.email;
            }
        });
    </script>
    <script src="./js/auth.js"></script>
</body>
</html>
